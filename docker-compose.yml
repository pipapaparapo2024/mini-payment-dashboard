services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: sqlite
      DASHBOARD_ATTENTION_DAYS: 14
      DASHBOARD_REFERENCE_DATE: "2026-08-14"
